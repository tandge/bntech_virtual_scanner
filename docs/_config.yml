# 站点基本信息（完全不变）
title: 我的开发日志
description: 记录软件开发过程中的学习心得、技术探索和项目实践
baseurl: "/bntech_virtual_scanner"  # 项目站点必须填写仓库名，用户站点留空
url: "https://tandge.github.io"  # 完全不变

# 作者信息（完全不变）
author:
  name: Ning,Ge / 葛宁
  email: tandge@gmail.com
  github: tandge

# 主题配置（完全不变）
theme: minima

# ✅ 新增：完整的 Kramdown 配置（解决 <details> 标签渲染问题）
markdown: kramdown
kramdown:
  input: GFM  # 强制使用 GitHub Flavored Markdown，100% 兼容 GitHub 预览
  parse_block_html: true  # 关键：允许解析 HTML 块内部的 Markdown
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# 插件配置（完全不变）
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 日期格式（完全不变）
date_format: "%Y-%m-%d"

# minima主题导航栏配置
header_pages:
  - index.md
  - archive.md
  - categories.md
  - tags.md
  - faq.md  # ✅ 新增：将 FAQ 页面添加到导航栏

# ⚠️ 修正：排除文件（路径现在相对于 /docs 目录）
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .jekyll-cache
  - .jekyll-metadata
  # 注意：这里不需要排除 README.md 和 LICENSE，因为它们在仓库根目录